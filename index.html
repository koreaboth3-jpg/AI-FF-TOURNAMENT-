<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI FF TOURNAMENT</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{margin:0;font-family:Poppins;background:#f6f8fb;}
header{display:flex;justify-content:space-between;padding:15px;background:#fff;position:sticky;top:0}
.logo{color:#00c48c;font-weight:700;font-size:20px}
.wallet{background:#00c48c;color:#fff;padding:8px 12px;border-radius:10px}

.container{padding:15px}
.box{background:#fff;padding:20px;border-radius:15px;margin-top:40px}
input{width:100%;padding:12px;margin:8px 0;border:1px solid #ddd;border-radius:10px}

button{width:100%;padding:12px;border:none;border-radius:10px;font-weight:700;margin-top:8px;cursor:pointer}
.primary{background:#00c48c;color:#fff}
.google{background:#db4437;color:#fff}

.page{display:none}

.bottom-nav{
position:fixed;bottom:0;width:100%;
display:flex;justify-content:space-around;
background:#fff;padding:10px;
border-top:1px solid #eee
}
</style>
</head>

<body>

<header>
<div class="logo">AI FF TOURNAMENT</div>
<div class="wallet">₹ <span id="balance">0</span></div>
</header>

<div class="container">

<!-- AUTH -->
<div id="authPage">
<div class="box">

<h3 id="title">Login</h3>

<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">

<button class="primary" onclick="emailAuth()" id="btn">Login</button>

<button class="google" onclick="googleLogin()">
Continue with Google
</button>

<p style="text-align:center;color:#00c48c;cursor:pointer" onclick="toggle()">
<span id="toggleText">Create Account</span>
</p>

</div>
</div>

<!-- HOME -->
<div class="page" id="homePage">
<h3>Welcome to AI FF TOURNAMENT</h3>
</div>

</div>

<!-- NAV -->
<div class="bottom-nav" id="nav" style="display:none;">
<button onclick="show('homePage')">Home</button>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
apiKey: "AIzaSyB986IQ99ePq3ixqEtIkwer4jriufOtCwc",
authDomain: "ai-ff-tournament.firebaseapp.com",
projectId: "ai-ff-tournament"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let isLogin = true;

/* ================= EMAIL LOGIN ================= */
function emailAuth(){
const email = email.value = document.getElementById("email").value;
const pass = document.getElementById("password").value;

if(!email || !pass){
alert("Fill all fields");
return;
}

if(isLogin){
auth.signInWithEmailAndPassword(email,pass)
.then(()=>alert("Login Success"))
.catch(e=>alert(e.message));
}
else{
auth.createUserWithEmailAndPassword(email,pass)
.then(async(cred)=>{
await db.collection("users").doc(cred.user.uid).set({
email,
balance:0,
username:"Player"
});
alert("Account Created");
})
.catch(e=>alert(e.message));
}
}

/* ================= GOOGLE LOGIN (FIXED) ================= */
const provider = new firebase.auth.GoogleAuthProvider();
provider.setCustomParameters({ prompt: "select_account" });

function googleLogin(){
auth.signInWithRedirect(provider);
}

/* Redirect result handle */
auth.getRedirectResult()
.then(async(result)=>{
if(result.user){
const user = result.user;

const ref = db.collection("users").doc(user.uid);
const doc = await ref.get();

if(!doc.exists){
await ref.set({
email:user.email,
username:user.displayName || "Player",
balance:0
});
}

alert("Google Login Success");
}
})
.catch(e=>console.log(e.message));

/* ================= AUTH STATE ================= */
auth.onAuthStateChanged(user=>{
if(user){
document.getElementById("authPage").style.display="none";
document.getElementById("nav").style.display="flex";
show("homePage");
}
else{
document.getElementById("authPage").style.display="block";
document.getElementById("nav").style.display="none";
}
});

/* ================= TOGGLE ================= */
function toggle(){
isLogin=!isLogin;
document.getElementById("title").innerText=isLogin?"Login":"Register";
document.getElementById("btn").innerText=isLogin?"Login":"Register";
document.getElementById("toggleText").innerText=isLogin?"Create Account":"Already Have Account";
}

/* ================= PAGE ================= */
function show(id){
document.querySelectorAll(".page").forEach(p=>p.style.display="none");
document.getElementById(id).style.display="block";
}
</script>

</body>
</html>
