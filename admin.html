<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI FF TOURNAMENT - Admin Panel</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f8fafc;
color:#1f2937;
overflow-x:hidden;
}

.sidebar{
position:fixed;
left:0;
top:0;
width:250px;
height:100vh;
background:#ffffff;
padding:20px;
border-right:1px solid #e2e8f0;
box-shadow: 2px 0 10px rgba(0,0,0,0.05);
}

.logo{
font-size:26px;
font-weight:700;
color:#00c48c;
margin-bottom:40px;
text-align:center;
line-height:1.2;
}

.menu button{
width:100%;
padding:15px;
margin-bottom:15px;
border:none;
border-radius:12px;
background:#f1f5f9;
color:#1f2937;
font-size:16px;
cursor:pointer;
transition:.3s;
font-weight:500;
}

.menu button:hover{
background:#00c48c;
color:#fff;
}

.main{
margin-left:250px;
padding:30px;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

.topbar h1{
font-size:28px;
color:#1f2937;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:30px;
}

.card{
background:#ffffff;
padding:20px;
border-radius:18px;
border:1px solid #e2e8f0;
box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
}

.card h2{
font-size:18px;
margin-bottom:10px;
color:#64748b;
}

.card p{
font-size:30px;
font-weight:700;
color:#00c48c;
}

.section{
background:#ffffff;
padding:25px;
border-radius:20px;
margin-bottom:30px;
border:1px solid #e2e8f0;
box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
}

.section h2{
margin-bottom:20px;
color:#1f2937;
}

input,textarea{
width:100%;
padding:14px;
margin-bottom:15px;
border:1px solid #cbd5e1;
outline:none;
border-radius:12px;
background:#fff;
color:#1f2937;
}

button.submit{
width:100%;
padding:15px;
border:none;
border-radius:12px;
background:#00c48c;
color:white;
font-weight:700;
font-size:16px;
cursor:pointer;
}

.tournament-list{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.tournament-card{
background:#ffffff;
padding:15px;
border-radius:15px;
border:1px solid #e2e8f0;
box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
}

.tournament-card img{
width:100%;
height:150px;
object-fit:cover;
border-radius:12px;
margin-bottom:10px;
}

.tournament-card h3{
margin-bottom:10px;
color:#1f2937;
}

.actions{
display:flex;
gap:10px;
margin-top:10px;
}

.actions button{
flex:1;
padding:10px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:600;
}

.delete{
background:#ef4444;
color:#fff;
}

.room{
background:#00c48c;
color:#fff;
}

table{
width:100%;
border-collapse:collapse;
}

table th,table td{
padding:14px;
text-align:left;
border-bottom:1px solid #e2e8f0;
}

table th{
background:#f8fafc;
color:#64748b;
font-weight:600;
}

@media(max-width:900px){
.sidebar{
width:100%;
height:auto;
position:relative;
}

.main{
margin-left:0;
}

.menu{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
}
}
</style>
</head>
<body>

<div class="sidebar">
<div class="logo">AI FF<br>TOURNAMENT</div>

<div class="menu">
<button onclick="showSection('dashboard')">Dashboard</button>
<button onclick="showSection('createTournament')">Create Tournament</button>
<button onclick="showSection('allTournaments')">All Tournaments</button>
<button onclick="showSection('users')">Users</button>
<button onclick="showSection('deposits')">Deposits</button>
<button onclick="showSection('withdraws')">Withdraws</button>
</div>
</div>

<div class="main">

<div class="topbar">
<h1>Admin Dashboard</h1>
</div>

<!-- Dashboard -->
<div class="section page" id="dashboard">
<div class="cards">
<div class="card">
<h2>Total Users</h2>
<p id="totalUsers">0</p>
</div>
<div class="card">
<h2>Total Tournaments</h2>
<p id="totalTour">0</p>
</div>
<div class="card">
<h2>Total Deposits</h2>
<p id="totalDep">0</p>
</div>
<div class="card">
<h2>Total Withdraws</h2>
<p id="totalWith">0</p>
</div>
</div>
</div>

<!-- Create Tournament -->
<div class="section page" id="createTournament" style="display:none;">
<h2>Create Tournament</h2>
<input type="text" id="title" placeholder="Tournament Title">
<input type="text" id="image" placeholder="Image URL">
<input type="number" id="fee" placeholder="Entry Fee">
<input type="number" id="pool" placeholder="Prize Pool">
<input type="number" id="slots" placeholder="Total Slots">

<button class="submit" onclick="createTournament()">Create Tournament</button>
</div>

<!-- All Tournaments -->
<div class="section page" id="allTournaments" style="display:none;">
<h2>All Tournaments</h2>
<div class="tournament-list" id="tournamentList"></div>
</div>

<!-- Users -->
<div class="section page" id="users" style="display:none;">
<h2>All Users</h2>
<table>
<thead>
<tr><th>Email</th><th>Balance</th></tr>
</thead>
<tbody id="usersTable"></tbody>
</table>
</div>

<!-- Deposits -->
<div class="section page" id="deposits" style="display:none;">
<h2>Deposit Requests</h2>
<table>
<thead>
<tr><th>User</th><th>Amount</th><th>Status</th></tr>
</thead>
<tbody id="depositTable"></tbody>
</table>
</div>

<!-- Withdraw -->
<div class="section page" id="withdraws" style="display:none;">
<h2>Withdraw Requests</h2>
<table>
<thead>
<tr><th>User</th><th>Amount</th><th>Status</th></tr>
</thead>
<tbody id="withdrawTable"></tbody>
</table>
</div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>

/* ================= FIREBASE CONFIG ================= */
const firebaseConfig = {
  apiKey: "AIzaSyB986IQ99ePq3ixqEtIkwer4jriufOtCwc",
  authDomain: "ai-ff-tournament.firebaseapp.com",
  databaseURL: "https://ai-ff-tournament-default-rtdb.firebaseio.com",
  projectId: "ai-ff-tournament",
  storageBucket: "ai-ff-tournament.firebasestorage.app",
  messagingSenderId: "268074101049",
  appId: "1:268074101049:web:2aabb197aba7672679e0e8"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* ================= PAGE SWITCH ================= */
function showSection(id){
document.querySelectorAll('.page').forEach(page => page.style.display = 'none');
document.getElementById(id).style.display = 'block';
}

/* ================= CREATE TOURNAMENT ================= */
function createTournament(){
const title = document.getElementById('title').value;
const image = document.getElementById('image').value;
const fee = document.getElementById('fee').value;
const pool = document.getElementById('pool').value;
const slots = document.getElementById('slots').value;

db.collection("tournaments").add({
title,
image,
fee: Number(fee),
pool: Number(pool),
slots: Number(slots),
filled: 0,
roomId: "",
roomPass: "",
createdAt: new Date()
}).then(() => {
alert("Tournament Created Successfully!");
// Clear inputs
document.getElementById('title').value = "";
document.getElementById('image').value = "";
document.getElementById('fee').value = "";
document.getElementById('pool').value = "";
document.getElementById('slots').value = "";
});
}

/* ================= LOAD TOURNAMENTS ================= */
db.collection("tournaments").onSnapshot(snapshot => {
document.getElementById('tournamentList').innerHTML = "";
document.getElementById('totalTour').innerText = snapshot.size;

snapshot.forEach(doc => {
const data = doc.data();
document.getElementById('tournamentList').innerHTML += `
<div class="tournament-card">
<img src="${data.image || 'https://via.placeholder.com/300x150'}">
<h3>${data.title}</h3>
<p>Fee: ₹${data.fee}</p>
<p>Pool: ₹${data.pool}</p>
<p>Slots: \( {data.filled || 0}/ \){data.slots}</p>

<input type="text" placeholder="Room ID" id="roomid-${doc.id}">
<input type="text" placeholder="Room Password" id="roompass-${doc.id}">

<div class="actions">
<button class="room" onclick="addRoom('${doc.id}')">Add Room</button>
<button class="delete" onclick="deleteTournament('${doc.id}')">Delete</button>
</div>
</div>`;
});
});

/* ================= DELETE TOURNAMENT ================= */
function deleteTournament(id){
if(confirm("Are you sure you want to delete this tournament?")) {
db.collection("tournaments").doc(id).delete();
}
}

/* ================= ADD ROOM ================= */
function addRoom(id){
const roomId = document.getElementById(`roomid-${id}`).value;
const roomPass = document.getElementById(`roompass-${id}`).value;

if(roomId && roomPass){
db.collection("tournaments").doc(id).update({ roomId, roomPass });
alert("Room Details Added!");
} else {
alert("Please fill both Room ID and Password");
}
}

/* ================= USERS ================= */
db.collection("users").onSnapshot(snapshot => {
document.getElementById('usersTable').innerHTML = "";
document.getElementById('totalUsers').innerText = snapshot.size;

snapshot.forEach(doc => {
const data = doc.data();
document.getElementById('usersTable').innerHTML += `
<tr>
<td>${data.email || 'N/A'}</td>
<td>₹${data.balance || 0}</td>
</tr>`;
});
});

/* ================= DEPOSITS ================= */
db.collection("deposits").onSnapshot(snapshot => {
document.getElementById('depositTable').innerHTML = "";
document.getElementById('totalDep').innerText = snapshot.size;

snapshot.forEach(doc => {
const data = doc.data();
document.getElementById('depositTable').innerHTML += `
<tr>
<td>${data.email}</td>
<td>₹${data.amount}</td>
<td>${data.status}</td>
</tr>`;
});
});

/* ================= WITHDRAWS ================= */
db.collection("withdraws").onSnapshot(snapshot => {
document.getElementById('withdrawTable').innerHTML = "";
document.getElementById('totalWith').innerText = snapshot.size;

snapshot.forEach(doc => {
const data = doc.data();
document.getElementById('withdrawTable').innerHTML += `
<tr>
<td>${data.email}</td>
<td>₹${data.amount}</td>
<td>${data.status}</td>
</tr>`;
});
});

</script>

</body>
</html>
